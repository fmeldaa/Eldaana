<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

html {
  background: #C4A99A;
  height: 100%;
}

body {
  background: #C4A99A;
  width: 100vw;
  /* Couvre tout l'écran y compris les zones safe-area (mode edge-to-edge) */
  min-height: 100vh;
  min-height: -webkit-fill-available;
  min-height: 100dvh;
  overflow: hidden;
  position: relative;
}

/* Logo plein écran — centré, couvre tout */
.logo-wrap {
  position: fixed;
  top: 0; left: 0;
  width: 100vw;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  animation: logoIn 1.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
  opacity: 0;
  z-index: 10;
  filter:
    drop-shadow(0 12px 48px rgba(192,132,252,0.30))
    drop-shadow(0 4px 16px rgba(129,140,248,0.20));
}

.logo-wrap img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

@keyframes logoIn {
  0%   { opacity: 0; transform: scale(0.4); }
  70%  { opacity: 1; transform: scale(1.03); }
  100% { opacity: 1; transform: scale(1); }
}

/* Barre inférieure avec nom + tagline */
.bottom-bar {
  position: fixed;
  bottom: 0; left: 0;
  width: 100%;
  padding: 20px 0 28px 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  background: linear-gradient(to top,
    rgba(196,169,154,0.97) 0%,
    rgba(196,169,154,0.80) 60%,
    transparent 100%
  );
  z-index: 20;
  animation: barIn 0.8s ease forwards 1.4s;
  opacity: 0;
}

@keyframes barIn {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

.name {
  font-size: 44px;
  font-weight: 800;
  letter-spacing: 8px;
  text-transform: uppercase;
  font-family: -apple-system, 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #c084fc 0%, #818cf8 50%, #38bdf8 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.line {
  width: 0;
  height: 2px;
  border-radius: 2px;
  background: linear-gradient(90deg, transparent, #c084fc 20%, #818cf8 50%, #38bdf8 80%, transparent);
  margin-top: 8px;
  animation: drawLine 0.7s ease forwards 2.0s;
}
@keyframes drawLine { from { width: 0; } to { width: 160px; } }

.tagline {
  margin-top: 7px;
  font-size: 12px;
  font-weight: 400;
  letter-spacing: 3px;
  text-transform: uppercase;
  font-family: -apple-system, 'Segoe UI', sans-serif;
  color: rgba(129, 140, 248, 0.75);
  animation: fadeUp 0.6s ease forwards 2.3s;
  opacity: 0;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Halo doux derrière le logo */
.glow-bg {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -55%);
  width: 100vw;
  height: 100vw;
  border-radius: 50%;
  background: radial-gradient(circle,
    rgba(192, 132, 252, 0.14) 0%,
    rgba(129, 140, 248, 0.09) 40%,
    rgba(56, 189, 248, 0.06) 65%,
    transparent 80%
  );
  animation: breathe 3.5s ease-in-out infinite;
  z-index: 1;
}
@keyframes breathe {
  0%, 100% { transform: translate(-50%, -55%) scale(1);    opacity: 0.7; }
  50%       { transform: translate(-50%, -55%) scale(1.06); opacity: 1;   }
}

/* Particules flottantes légères */
.particle {
  position: fixed;
  border-radius: 50%;
  pointer-events: none;
  z-index: 5;
  animation: float linear infinite;
}
@keyframes float {
  0%   { transform: translateY(110vh) scale(0); opacity: 0; }
  10%  { opacity: 1; }
  90%  { opacity: 0.5; }
  100% { transform: translateY(-10vh) scale(1); opacity: 0; }
}
</style>
</head>
<body>

<div class="glow-bg"></div>

<div class="logo-wrap">
  <img src="file:///android_asset/logo.png" alt="Eldaana"/>
</div>

<div class="bottom-bar">
  <div class="name">Eldaana</div>
  <div class="line"></div>
  <div class="tagline">Votre futur commence ici</div>
</div>

<script>
const colors = ['#c084fc', '#818cf8', '#38bdf8', '#e879f9'];
const count  = 14;
for (let i = 0; i < count; i++) {
  const p   = document.createElement('div');
  p.className = 'particle';
  const sz  = Math.random() * 5 + 2;
  const lft = Math.random() * 100;
  const dur = Math.random() * 8 + 6;
  const del = Math.random() * 6;
  const col = colors[Math.floor(Math.random() * colors.length)];
  p.style.cssText =
    `width:${sz}px;height:${sz}px;left:${lft}vw;background:${col};` +
    `opacity:0.5;animation-duration:${dur}s;animation-delay:${del}s;filter:blur(1px);`;
  document.body.appendChild(p);
}
</script>
</body>
</html>
